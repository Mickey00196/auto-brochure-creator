# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploy: push this repo to GitHub, then in the Render dashboard choose
# "New > Blueprint" and point it at the repo. Render reads this file and
# provisions all three resources below in one go. After the first deploy,
# provision colleague accounts with:
#   render ssh proposal-engine-backend -- python -m app.cli create-user \
#     --email sam@yourcompany.example --name "Sam de Boer" --password "..." --role broker
# (or open a shell from the Render dashboard's "Shell" tab and run the same command).
databases:
  - name: proposal-engine-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: proposal-engine-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: proposal-engine-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_MAPS_API_KEY
        sync: false

  - type: web
    name: proposal-engine-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: INTERNAL_API_BASE_URL
        fromService:
          type: web
          name: proposal-engine-backend
          property: hostport
